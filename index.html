<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudySphere</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Custom Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    </head>
<body class="bg-paper text-slate-900 font-sans selection:bg-yellow-200 min-h-screen">
    <!-- Loading Screen -->
    <div id="loading-screen" class="min-h-screen flex items-center justify-center">
        <div class="flex flex-col items-center animate-pulse">
            <i data-lucide="book" class="w-12 h-12 text-slate-300 mb-4"></i>
            <p class="font-handwritten text-2xl text-slate-400" id="loading-text">Opening notebook...</p>
        </div>
    </div>

    <!-- Login Screen -->
    <div id="login-screen" class="hidden min-h-screen flex flex-col items-center justify-center p-6">
        <div class="bg-white p-8 rounded-3xl shadow-sm border-2 border-slate-100 max-w-sm w-full text-center">
            <div class="bg-slate-800 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-6 rotate-3">
                <i data-lucide="book" class="w-8 h-8 text-white"></i>
            </div>
            <h1 class="text-3xl font-bold text-slate-800 mb-2">StudySphere</h1>
            <p class="font-handwritten text-2xl text-slate-500 mb-8">Who is studying today?</p>
            
            <form id="login-form">
                <input
                    type="text"
                    id="username-input"
                    placeholder="Enter your name..."
                    class="w-full px-4 py-3 rounded-xl border-2 border-slate-200 mb-4 focus:outline-none focus:border-blue-400 font-medium text-slate-700 placeholder:text-slate-400"
                    autocomplete="off"
                    required
                />
                <button 
                    type="submit" 
                    id="login-btn"
                    class="w-full bg-slate-800 text-white font-bold py-3.5 rounded-xl hover:bg-slate-700 transition-colors flex items-center justify-center gap-2"
                >
                    Open Notebook <i data-lucide="chevron-right" class="w-5 h-5"></i>
                </button>
            </form>
        </div>
    </div>

    <!-- Main App Screen -->
    <div id="main-app" class="hidden">
        <!-- Navigation -->
        <nav class="sticky top-0 z-50 bg-[#FAF9F6]/80 backdrop-blur-md border-b border-slate-200/50 px-6 py-4">
            <div class="max-w-6xl mx-auto flex justify-between items-center">
                <div class="flex items-center gap-2 cursor-pointer group" onclick="window.app.navigate('dashboard')">
                    <div class="bg-slate-800 text-white p-1.5 rounded-lg group-hover:rotate-12 transition-transform">
                        <i data-lucide="book" class="w-5 h-5"></i>
                    </div>
                    <span class="font-bold text-xl tracking-tight">StudySphere</span>
                </div>
                
                <div class="flex items-center gap-4 text-sm font-medium text-slate-500">
                    <span class="hidden sm:inline-block font-handwritten text-xl text-slate-600" id="nav-username">Notebook</span>
                    <div class="w-8 h-8 rounded-full bg-blue-100 flex items-center justify-center font-bold text-blue-800 border-2 border-white shadow-sm" id="nav-initial">
                        U
                    </div>
                </div>
            </div>
        </nav>

        <!-- Dynamic Content Container -->
        <main id="app-content" class="px-6 py-10 max-w-4xl mx-auto"></main>
    </div>

    <!-- Celebration Overlay -->
    <div id="celebration-overlay" class="hidden fixed inset-0 z-[100] pointer-events-none flex items-center justify-center bg-black/5 backdrop-blur-sm">
        <div class="bg-white p-8 rounded-3xl shadow-2xl flex flex-col items-center animate-stamp border-4 border-yellow-400 rotate-[-5deg]">
            <i data-lucide="award" class="w-20 h-20 text-yellow-500 mb-4"></i>
            <h2 class="text-4xl font-black text-slate-800 uppercase tracking-widest">Mastered!</h2>
            <p class="font-handwritten text-3xl text-slate-500 mt-2">Amazing work.</p>
        </div>
    </div>
<script src="script.js"></script>
</body>
</html>
